<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ table.name }} — Order</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>

<header class="order-page-header">
  <div class="cafe-name">Cafe Portal</div>
  <h1>{{ table.name }}</h1>
  <p>Browse the menu and place your order below</p>
</header>

<main class="order-page-main">

  <!-- Menu Panel -->
  <section class="menu-section">
    <div class="menu-section-header">
      <h2>Menu</h2>
      <input id="menu-search" class="search-input" type="search" placeholder="Search items..." />
    </div>
    <div class="menu-body">
      <div id="menu-container">
        <p style="color:var(--text-muted);text-align:center;padding:2rem;">Loading menu…</p>
      </div>
    </div>
  </section>

  <!-- Cart Panel -->
  <aside class="cart-section">
    <div class="cart-header">
      <h2>Your Order</h2>
      <span class="cart-count-badge" id="cart-badge">0</span>
    </div>
    <div class="cart-body">
      <div class="cart-items" id="cart-items">
        <p style="color:var(--text-muted);font-size:0.875rem;text-align:center;padding:1rem 0;">Your cart is empty</p>
      </div>

      <div class="cart-divider"></div>

      <div class="cart-totals">
        <div class="cart-row">
          <span>Items</span>
          <span id="item-count">0</span>
        </div>
        <div class="cart-row total">
          <span>Total</span>
          <span>$<span id="order-total">0.00</span></span>
        </div>
      </div>

      <button id="clear-cart" class="btn btn-ghost btn-full btn-sm" type="button" style="margin-bottom:1rem;border:1.5px solid var(--border);">Clear Cart</button>

      <form id="checkout-form">
        <input type="hidden" id="table-id" value="{{ table.id }}" />
        <input
          id="customer-name"
          class="checkout-input"
          name="customerName"
          placeholder="Your name (optional)"
          autocomplete="name"
        />
        <button type="submit" class="btn btn-primary btn-full">Place Order</button>
      </form>

      <div id="checkout-response" class="checkout-response"></div>
    </div>
  </aside>

</main>

<script src="/static/js/table.js" defer></script>
</body>
</html>
